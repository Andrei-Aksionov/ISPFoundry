name: Test notebooks
on:
  push:
    branches: [main]
    paths: &shared_paths
      - tests/test_notebooks.py
      - notebooks/
      - .github/workflows/test-notebooks.yaml
  pull_request:
    branches: [main]
    paths: *shared_paths

jobs:
  test_notebooks:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.13']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install Python dependencies via uv sync
        run: uv sync

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y exiftool

      - name: Running tests
        run: uv run pytest tests/test_notebooks.py -vs
