name: Test with HDR+ Dataset downloader
on:
  push:
    branches: [main]
    paths: &shared_paths
      - tests/test_datasets.py
      - ispfoundry/datasets/hdrplus_downloader.py
      - .github/workflows/test-hdrplus-downloader.yaml
  pull_request:
    branches: [main]
    paths: *shared_paths

jobs:
  dataset_downloader_test:
    name: ${{ matrix.os }} (Py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.13']

    steps:
      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: 'gsutil'

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install Python dependencies via uv sync
        run: uv sync

      - name: Running tests
        run: uv run pytest tests/test_dataset_downloader.py -s
