data:
  folder: data
  raw: ${data.folder}/raw
  interim: ${data.folder}/interim
  hdrplus_dataset: ${data.raw}/hdrplus_dataset

links:
  # HDR example
  tree_example_path: hdrplusdata/20171106_subset/bursts/0006_20160722_115157_431/
  tree_example_final_path: hdrplusdata/20171106/results_20161014/0006_20160722_115157_431/final.jpg
  # Low light example
  zurich_example_path: hdrplusdata/20171106_subset/bursts/0047_20160609_133132_746/

pipeline:
  default_steps:
    - black_level_subtraction
    - lens_shading_correction
    - align_and_merge

  lsc_cfa: # In HDR+ dataset every lens shading map has RGGB pattern
    - R
    - Gr
    - Gb
    - B
